  - name: Rotaneta home
    url: https://rotaneta.com/en
    kind: company

  # Dream Yacht Charter блокирует прямой GET (403). Используем альтернативный
  # маркетинговый URL — он отвечает и содержит список флота Турции.
  - name: Dream Yacht Charter Turkey
    url: https://www.dreamyachtworldwide.com/destination/turkey/
    kind: company

  - name: BBS Yachting (via Yasido)
    url: https://yasido.com/charter-companies/bbs-yachting-turkey
