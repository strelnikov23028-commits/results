    kind: company

  - name: Marmaris Sailing (home)
    url: https://marmaris-sailing.com/
    kind: company

  - name: IYC Turkey megayachts
    url: https://iyc.com/turkey/
    kind: company

  - name: Northrop & Johnson Turkey
    url: https://www.northropandjohnson.com/yacht-charter/mediterranean/turkey
