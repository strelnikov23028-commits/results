name: Turkey yacht — Aquila watch

on:
  schedule:
    # ежедневно ~06:17 UTC = ~09:17 МСК
    - cron: "17 6 * * *"
  workflow_dispatch:  # ручной запуск из UI

permissions:
  contents: write   # чтобы коммитить обновлённый state/last_status.json

concurrency:
  group: turkey-yacht-monitor
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: turkey-yacht-monitor
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: turkey-yacht-monitor/requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run monitor
        run: python monitor.py

      - name: Notify Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # При ручном запуске шлём heartbeat-сводку (для проверки/успокоения).
          # При cron-запуске молчим, кроме случаев с реальной находкой.
          ALWAYS_PING: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
        run: python notify.py

      - name: Upload run artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aquila-watch-run-${{ github.run_id }}
          path: turkey-yacht-monitor/state/last_run.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Commit updated state
        if: success()
        run: |
          git config user.name  "aquila-watch-bot"
          git config user.email "actions@users.noreply.github.com"
          if [ -n "$(git status --porcelain state/last_status.json)" ]; then
            git add state/last_status.json
            git commit -m "aquila-watch: update state $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          else
            echo "state unchanged"
          fi
